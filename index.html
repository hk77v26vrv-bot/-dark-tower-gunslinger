<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gunslinger</title>

<style>

body{
    margin:0;
    background:#1b140d;
    color:#e6d5a8;
    font-family:Georgia,serif;
}

#game{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

#stats{
    background:#2d2218;
    padding:15px;
    border-radius:8px;
    margin-bottom:15px;
}

#story{
    background:#111;
    min-height:220px;
    padding:15px;
    border-radius:8px;
    overflow-y:auto;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    margin:8px 0;
    font-size:18px;
    background:#6a4d2f;
    color:white;
    border:none;
    border-radius:8px;
}

button:active{
    background:#8a6840;
}

</style>
</head>

<body>

<div id="game">

<h1>The Gunslinger</h1>

<div id="stats">
Health: <span id="health">10</span><br>
Ammo: <span id="ammo">6</span><br>
Food: <span id="food">3</span><br>
Water: <span id="water">3</span><br>
Distance: <span id="distance">0</span> miles
</div>

<div id="story">
<p><b>The man in black fled across the desert...</b></p>
<p>...and the gunslinger followed.</p>
</div>

<button onclick="travel()">Travel</button>
<button onclick="rest()">Rest</button>
<button onclick="hunt()">Hunt</button>

<script>

const player={
health:10,
ammo:6,
food:3,
water:3,
distance:0
};

function update(){

health.textContent=player.health;
ammo.textContent=player.ammo;
food.textContent=player.food;
water.textContent=player.water;
distance.textContent=player.distance;

localStorage.setItem("gunslingerSave",JSON.stringify(player));

}

function write(text){
story.innerHTML+="<p>"+text+"</p>";
story.scrollTop=story.scrollHeight;
}

function travel(){

player.distance+=5;
player.food--;
player.water--;

const roll=Math.random();

if(roll<0.3){

fight();

}else if(roll<0.5){

player.water++;
write("You discover a small spring.");

}else{

write("The desert stretches endlessly before you.");

}

update();

}

function rest(){

player.health=Math.min(10,player.health+2);
write("You rest beneath the stars.");
update();

}

function hunt(){

if(player.ammo<=0){

write("You have no ammunition.");
return;

}

player.ammo--;
player.food+=2;

write("You hunt successfully.");

update();

}

function fight(){

if(player.ammo<=0){

player.health-=2;
write("A mutant attacks. You have no bullets!");
update();
return;

}

player.ammo--;

if(Math.random()<0.7){

write("You kill the mutant with a single shot.");

}else{

player.health-=2;
write("The mutant wounds you before escaping.");

}

update();

}

const save=localStorage.getItem("gunslingerSave");

if(save){

Object.assign(player,JSON.parse(save));
write("Game loaded.");

}

update();

</script>

</div>

</body>
</html>
