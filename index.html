<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Gunslinger</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

<h1>THE GUNSLINGER</h1>

<div id="stats">

<div class="stat">
Day
<span id="day">1</span>
</div>

<div class="stat">
Location
<span id="location">Mohaine Desert</span>
</div>

<div class="stat">
Distance
<span id="distance">0 miles</span>
</div>

<div class="stat">
Ammo
<span id="ammo">6</span>
</div>

<div class="stat">
Food
<span id="food">3</span>
</div>

<div class="stat">
Water
<span id="water">3</span>
</div>

</div>

<div id="healthContainer">

<div id="healthLabel">
Health
</div>

<div id="healthOuter">

<div id="healthBar"></div>

</div>

</div>

<div id="story">

<p><strong>The man in black fled across the desert...</strong></p>

<p>...and the gunslinger followed.</p>

</div>

<div id="buttons">

<button id="travelBtn">Travel</button>

<button id="restBtn">Rest</button>

<button id="huntBtn">Hunt</button>

<button id="inventoryBtn">Inventory</button>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
